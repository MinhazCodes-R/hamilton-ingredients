  <header class="topbar">
    <div class="topbar-inner">
      <h1>🍳 Hamilton Kitchen Ingredients</h1>
      <p class="subtitle">What's in stock, what's on the shopping list — updated <span id="updated-date"></span></p>
    </div>
  </header>

  <main>
    <div class="controls">
      <input id="search" type="search" placeholder="Search ingredients…" autocomplete="off" />
      <div class="tabs" id="status-tabs">
        <button class="tab active" data-status="all">All</button>
        <button class="tab" data-status="have">In Stock</button>
        <button class="tab" data-status="need">Shopping List</button>
        <button class="tab" data-status="low">Running Low</button>
      </div>
      <div class="chip-row" id="category-chips"></div>
    </div>

    <div class="count-row">
      <p class="count" id="result-count"></p>
      <button id="clear-checked" class="link-btn" hidden>Clear checked-off items</button>
    </div>

    <div class="grid" id="grid"></div>
    <p class="empty" id="empty-msg" hidden>No ingredients match your filters.</p>
  </main>

  <footer>
    <p>Generated from kitchen photos · <span id="total-count"></span> ingredients tracked</p>
  </footer>
